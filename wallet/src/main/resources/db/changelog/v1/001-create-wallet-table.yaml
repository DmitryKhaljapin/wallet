databaseChangeLog:
  - changeSet:
      id: 001-create-wallet-table
      author: dmitrix

      changes:
        - createTable:
            tableName: wallet

            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: balance
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false

        - sql:
            sql: |
              ALTER TABLE wallet
              ADD CONSTRAINT chk_wallet_balance
              CHECK (balance >= 0);