openapi: 3.0.3
info:
  title: Wallet API
  version: 1.0.0

paths:
  /api/v1/wallet:
    post:
      tags:
        - Wallet
      summary: Update wallet
      operationId: updateWallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
             $ref: "#/components/schemas/WalletRequest"
      responses:
        '200':
          $ref: "#/components/responses/SuccessResponse"
        '400':
          $ref: "#/components/responses/ValidationError"
        '404':
          $ref: "#/components/responses/NotFound"
        '422':
          $ref: "#/components/responses/NotEnoughMoney"

  /api/v1/wallets/{id}:
    get:
      tags:
        - Wallet
      summary: get wallet by id
      operationId: getWalletById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: "#/components/responses/SuccessResponse"
        '404':
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - message
        - status
        - timestamp
      properties:
        message:
          type: string
          example: Wallet not found
        status:
          type: integer
          example: 404
        timestamp:
          type: string
          format: date-time

    WalletRequest:
      type: object
      required:
        - walletId
        - operationType
        - amount
      properties:
        walletId:
          type: string
          format: uuid
        operationType:
          type: string
          enum:
            - DEPOSIT
            - WITHDRAW
        amount:
          type: number
          format: double
          example: 1000.50
    WalletResponse:
      type: object
      properties:
        walletId:
          type: string
          format: uuid
        balance:
          type: number
          format: double
          example: 15000.75
  responses:
    SuccessResponse:
      description: Ok
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WalletResponse"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotEnoughMoney:
      description: Not enough money
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'


